server:
  address: ${META_AGENT_SERVER_ADDRESS:127.0.0.1}
  port: ${META_AGENT_SERVER_PORT:8080}

spring:
  application:
    name: meta-agent
  datasource:
    url: ${META_AGENT_DB_URL:jdbc:mysql://127.0.0.1:3307/meta_agent?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${META_AGENT_DB_USER:meta_agent}
    password: ${META_AGENT_DB_PASSWORD:change-me-local}
  flyway:
    enabled: true
  jackson:
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumTypeHandler
  mapper-locations: classpath*:/mapper/**/*.xml
  type-handlers-package: com.funjson.metaagent.common.persistence.mybatis

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized

meta-agent:
  artifact:
    root: ${META_AGENT_ARTIFACT_ROOT:./.data/artifacts}
  chat:
    response-mode: ${META_AGENT_CHAT_RESPONSE_MODE:sse-replay}
    stream-timeout-ms: ${META_AGENT_CHAT_STREAM_TIMEOUT_MS:120000}
    stream-poll-interval-ms: ${META_AGENT_CHAT_STREAM_POLL_INTERVAL_MS:350}
  provider:
    deepseek:
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
      api-key: ${DEEP_SEEK_API_KEY:${DEEPSEEK_API_KEY:}}
    glm:
      base-url: ${GLM_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
      model: ${GLM_MODEL:glm-4.5}
      api-key: ${GLM_API_KEY:${ZHIPU_API_KEY:}}
